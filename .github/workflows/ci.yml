name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "ruff==0.15.9"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  test:
    name: Test (py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # protostar's only dependency, constellation-bio, is not on PyPI — it is
      # installed from the (public) lab repo so CI always tests against the
      # latest Constellation — protostar drives its development.
      - name: Install constellation (latest main) + protostar
        run: |
          python -m pip install --upgrade pip
          pip install "constellation-bio[ms] @ git+https://github.com/wilburnlab/constellation.git@main"
          pip install -e ".[dev]"
      - name: Run tests
        # Tolerate exit 5 (no tests collected) during the bootstrap window before
        # the data-layer tests land; real failures (exit 1) still fail the job.
        run: pytest || [ $? -eq 5 ]
